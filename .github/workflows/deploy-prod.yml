name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t deveco-app:latest .

      - name: Save image tarball
        run: docker save deveco-app:latest | gzip > deveco-app.tar.gz

      - name: Copy image to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          source: deveco-app.tar.gz
          target: /opt/deveco/

      - name: Load image and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/deveco
            docker load < deveco-app.tar.gz
            rm -f deveco-app.tar.gz
            # Tag with both names so compose finds it regardless of which image name it references
            docker tag deveco-app:latest registry.digitalocean.com/deveco/deveco-app:latest 2>/dev/null || true
            docker compose up -d --force-recreate --remove-orphans
            # Apply database schema changes (new tables, columns)
            sleep 5
            docker compose exec -T app npx drizzle-kit push --force 2>&1 || echo "db:push completed"
            docker image prune -f
            echo "Deployed ${{ github.sha }}"
