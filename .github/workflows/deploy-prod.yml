name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/deveco

            # Pull latest code
            if [ ! -d repo ]; then
              git clone https://github.com/devEcoConsultingLLC/deveco-io.git repo
            fi
            cd repo
            git fetch origin main
            git reset --hard origin/main

            # Build Docker image locally on droplet
            docker build -t deveco-app:latest .

            # Copy updated compose + Caddyfile to deploy dir
            cp deploy/docker-compose.prod.yml /opt/deveco/docker-compose.yml

            # Restart services
            cd /opt/deveco
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployed $(cd /opt/deveco/repo && git rev-parse --short HEAD)"
