name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t deveco-app:latest .

      - name: Save image tarball
        run: docker save deveco-app:latest | gzip > deveco-app.tar.gz

      - name: Copy image to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          source: deveco-app.tar.gz
          target: /opt/deveco/

      - name: Load image and restart
        uses: appleboy/ssh-action@v1
        env:
          # Email transport key, injected from the encrypted GitHub secret into the
          # droplet env at deploy time — never stored in the repo or the image.
          NUXT_RESEND_API_KEY: ${{ secrets.NUXT_RESEND_API_KEY }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          # Forward the runner env var into the remote SSH session.
          envs: NUXT_RESEND_API_KEY
          script: |
            set -e
            cd /opt/deveco
            docker load < deveco-app.tar.gz
            rm -f deveco-app.tar.gz
            # Inject the email transport into the compose env_file (app.env_file: .env)
            # from the CI secret. Idempotent: strip any prior NUXT_RESEND_* lines, then
            # re-add. Skipped when the secret is unset (transport stays console).
            if [ -n "$NUXT_RESEND_API_KEY" ]; then
              touch .env
              grep -vE '^NUXT_(EMAIL_ADAPTER|RESEND_API_KEY|RESEND_FROM)=' .env > .env.next || true
              printf 'NUXT_EMAIL_ADAPTER=resend\nNUXT_RESEND_API_KEY=%s\nNUXT_RESEND_FROM=noreply@deveco.io\n' "$NUXT_RESEND_API_KEY" >> .env.next
              mv .env.next .env
              echo "Configured Resend transport in /opt/deveco/.env"
            else
              echo "No NUXT_RESEND_API_KEY secret — leaving email transport as-is"
            fi
            # Tag with both names so compose finds it regardless of which image name it references
            docker tag deveco-app:latest registry.digitalocean.com/deveco/deveco-app:latest 2>/dev/null || true
            docker compose up -d --force-recreate --remove-orphans
            # Apply committed schema migrations via drizzle-kit migrate.
            # (Replaced db-push.mjs in session 128 — push blocks in CI on TTY
            # prompts for constraint changes on populated tables; migrate just
            # runs committed .sql files and tracks state in drizzle.__drizzle_migrations.)
            sleep 5
            docker compose exec -T app node scripts/db-migrate.mjs 2>&1 | tee /tmp/dbmigrate.log \
              || { echo "::error::db:migrate failed — see log above"; cat /tmp/dbmigrate.log; exit 1; }
            docker image prune -f
            # Post-deploy smoke test — verify app is responding
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              echo "⏳ Waiting for app to start... ($i/5)"
              sleep 5
            done
            curl -sf http://localhost:3000/ || echo "::warning::Health check failed — app may not have started correctly"
            echo "Deployed ${{ github.sha }}"
